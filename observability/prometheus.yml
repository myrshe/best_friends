global:
  scrape_interval: 10s

scrape_configs:
  - job_name: 'course-ai-assistant'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:8000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'ai-assistant:8000'